<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Mi Cineoteca</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #0A0A0F;
      --surface:  #111118;
      --card:     #16161F;
      --red:      #E50914;
      --red-dim:  #8B0000;
      --gold:     #FFD700;
      --text:     #F5F5F5;
      --muted:    #888;
      --border:   #222;
    }

    html { scroll-behavior: smooth; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ── NAV ─────────────────────────────────────── */
    nav {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      display: flex; align-items: center; justify-content: space-between;
      padding: 16px 40px;
      background: linear-gradient(to bottom, rgba(10,10,15,.95) 0%, transparent 100%);
      backdrop-filter: blur(4px);
    }
    .logo {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 2rem;
      color: var(--red);
      letter-spacing: 2px;
      text-shadow: 0 0 30px rgba(229,9,20,.5);
    }
    .logo span { color: var(--text); }
    .nav-count {
      font-size: .75rem;
      color: var(--muted);
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    /* ── HERO ────────────────────────────────────── */
    .hero {
      position: relative;
      min-height: 320px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 140px 40px 60px;
      text-align: center;
      overflow: hidden;
    }
    /* projector beam effect */
    .hero::before {
      content: '';
      position: absolute;
      top: -80px; left: 50%; transform: translateX(-50%);
      width: 320px; height: 520px;
      background: conic-gradient(from -8deg at 50% 0%, transparent 0deg, rgba(229,9,20,.08) 16deg, transparent 16deg);
      pointer-events: none;
    }
    .hero::after {
      content: '';
      position: absolute;
      bottom: 0; left: 0; right: 0; height: 120px;
      background: linear-gradient(to bottom, transparent, var(--bg));
    }
    .hero h1 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(2.8rem, 7vw, 5.5rem);
      letter-spacing: 4px;
      line-height: 1;
      margin-bottom: 12px;
    }
    .hero h1 em {
      font-style: normal;
      color: var(--red);
      text-shadow: 0 0 40px rgba(229,9,20,.6);
    }
    .hero p {
      color: var(--muted);
      font-size: .95rem;
      margin-bottom: 36px;
      font-weight: 300;
    }

    /* ── SEARCH ──────────────────────────────────── */
    .search-wrap {
      position: relative;
      width: 100%;
      max-width: 520px;
    }
    .search-wrap svg {
      position: absolute; left: 18px; top: 50%; transform: translateY(-50%);
      color: var(--muted); pointer-events: none;
    }
    #search {
      width: 100%;
      padding: 16px 18px 16px 50px;
      background: rgba(255,255,255,.06);
      border: 1px solid rgba(255,255,255,.1);
      border-radius: 12px;
      color: var(--text);
      font-size: 1rem;
      font-family: 'Inter', sans-serif;
      outline: none;
      transition: border-color .2s, background .2s;
    }
    #search::placeholder { color: var(--muted); }
    #search:focus {
      border-color: var(--red);
      background: rgba(229,9,20,.06);
    }

    /* ── FILTERS ─────────────────────────────────── */
    .filters {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: center;
      padding: 0 40px 36px;
    }
    .filter-btn {
      padding: 7px 18px;
      border-radius: 20px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--muted);
      font-size: .8rem;
      font-family: 'Inter', sans-serif;
      cursor: pointer;
      transition: all .2s;
      letter-spacing: .5px;
      text-transform: uppercase;
    }
    .filter-btn:hover, .filter-btn.active {
      background: var(--red);
      border-color: var(--red);
      color: #fff;
    }

    /* ── SECTION HEADER ──────────────────────────── */
    .section-header {
      display: flex;
      align-items: baseline;
      gap: 14px;
      padding: 0 40px 20px;
    }
    .section-header h2 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.6rem;
      letter-spacing: 2px;
    }
    .section-header .count {
      font-size: .75rem;
      color: var(--muted);
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    /* ── GRID ────────────────────────────────────── */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      gap: 20px;
      padding: 0 40px 80px;
    }

    /* ── CARD ────────────────────────────────────── */
    .card {
      position: relative;
      border-radius: 10px;
      overflow: hidden;
      background: var(--card);
      cursor: pointer;
      transition: transform .25s ease, box-shadow .25s ease;
      border: 1px solid transparent;
    }
    .card:hover {
      transform: translateY(-6px) scale(1.03);
      box-shadow: 0 20px 50px rgba(0,0,0,.7), 0 0 0 1px var(--red-dim);
      border-color: var(--red-dim);
      z-index: 2;
    }
    .card-poster {
      width: 100%;
      aspect-ratio: 2/3;
      object-fit: cover;
      display: block;
      background: var(--surface);
    }
    /* placeholder when no image */
    .card-poster-placeholder {
      width: 100%;
      aspect-ratio: 2/3;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      gap: 12px;
    }
    .card-poster-placeholder svg { opacity: .25; }
    .card-poster-placeholder .ph-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1rem;
      letter-spacing: 1px;
      color: var(--muted);
      text-align: center;
      padding: 0 10px;
      line-height: 1.2;
    }

    /* hover overlay */
    .card-overlay {
      position: absolute; inset: 0;
      background: linear-gradient(to top, rgba(10,10,15,.98) 0%, rgba(10,10,15,.3) 60%, transparent 100%);
      opacity: 0;
      transition: opacity .25s;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      padding: 16px;
    }
    .card:hover .card-overlay { opacity: 1; }

    .card-info {
      padding: 12px;
      border-top: 1px solid var(--border);
    }
    .card-title {
      font-size: .85rem;
      font-weight: 600;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-bottom: 4px;
    }
    .card-meta {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: .72rem;
      color: var(--muted);
    }
    .card-year { }
    .card-dot { width: 3px; height: 3px; border-radius: 50%; background: var(--border); }
    .card-genre {
      background: rgba(229,9,20,.15);
      color: var(--red);
      padding: 2px 7px;
      border-radius: 4px;
      font-size: .65rem;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: .5px;
    }

    /* overlay details */
    .ov-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.2rem;
      letter-spacing: 1px;
      margin-bottom: 4px;
    }
    .ov-desc {
      font-size: .72rem;
      color: #bbb;
      line-height: 1.4;
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
      margin-bottom: 8px;
    }
    .ov-play {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: var(--red);
      color: #fff;
      border: none;
      border-radius: 6px;
      padding: 7px 14px;
      font-size: .78rem;
      font-weight: 600;
      font-family: 'Inter', sans-serif;
      cursor: pointer;
      transition: background .15s;
      text-decoration: none;
    }
    .ov-play:hover { background: #c1070f; }

    /* ── EMPTY STATE ─────────────────────────────── */
    .empty {
      grid-column: 1 / -1;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 80px 20px;
      color: var(--muted);
      gap: 12px;
    }
    .empty svg { opacity: .2; }
    .empty p { font-size: .9rem; }

    /* ── MODAL ───────────────────────────────────── */
    .modal-bg {
      display: none;
      position: fixed; inset: 0; z-index: 200;
      background: rgba(0,0,0,.8);
      backdrop-filter: blur(6px);
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .modal-bg.open { display: flex; }
    .modal {
      background: var(--card);
      border-radius: 16px;
      width: 100%;
      max-width: 560px;
      border: 1px solid var(--border);
      overflow: hidden;
      position: relative;
      animation: popIn .2s ease;
    }
    @keyframes popIn {
      from { opacity: 0; transform: scale(.94); }
      to   { opacity: 1; transform: scale(1); }
    }
    .modal-close {
      position: absolute; top: 14px; right: 14px;
      background: rgba(255,255,255,.1);
      border: none; border-radius: 50%;
      width: 32px; height: 32px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; color: var(--text); z-index: 10;
      transition: background .15s;
    }
    .modal-close:hover { background: var(--red); }
    .modal-poster {
      width: 100%;
      height: 240px;
      object-fit: cover;
      object-position: top;
      display: block;
    }
    .modal-poster-ph {
      width: 100%; height: 200px;
      background: linear-gradient(135deg, #1a1a2e, #16213e);
      display: flex; align-items: center; justify-content: center;
    }
    .modal-body { padding: 24px; }
    .modal-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 2rem;
      letter-spacing: 2px;
      margin-bottom: 8px;
    }
    .modal-meta {
      display: flex; gap: 12px; flex-wrap: wrap;
      font-size: .8rem; color: var(--muted);
      margin-bottom: 16px;
      align-items: center;
    }
    .modal-meta .tag {
      background: rgba(229,9,20,.15);
      color: var(--red);
      padding: 3px 10px;
      border-radius: 5px;
      font-size: .7rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: .5px;
    }
    .modal-desc {
      font-size: .88rem;
      color: #bbb;
      line-height: 1.65;
      margin-bottom: 20px;
    }
    .modal-actions { display: flex; gap: 10px; }
    .btn-primary {
      display: inline-flex; align-items: center; gap: 8px;
      background: var(--red);
      color: #fff; border: none; border-radius: 8px;
      padding: 11px 22px;
      font-size: .88rem; font-weight: 600;
      font-family: 'Inter', sans-serif;
      cursor: pointer; transition: background .15s;
      text-decoration: none;
    }
    .btn-primary:hover { background: #c1070f; }

    /* ── FOOTER ──────────────────────────────────── */
    footer {
      text-align: center;
      padding: 30px;
      border-top: 1px solid var(--border);
      color: var(--muted);
      font-size: .75rem;
      letter-spacing: .5px;
    }

    /* ── RESPONSIVE ──────────────────────────────── */
    @media (max-width: 600px) {
      nav { padding: 14px 20px; }
      .hero { padding: 120px 20px 40px; }
      .filters { padding: 0 20px 28px; }
      .section-header { padding: 0 20px 16px; }
      .grid { grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 14px; padding: 0 20px 60px; }
    }
  </style>
</head>
<body>

<!-- NAV -->
<nav>
  <div class="logo">Mi<span>Cine</span></div>
  <div class="nav-count" id="nav-count">0 películas</div>
</nav>

<!-- HERO -->
<section class="hero">
  <h1>Tu <em>Cineoteca</em><br>Personal</h1>
  <p>Todas tus películas, en un solo lugar.</p>
  <div class="search-wrap">
    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
    </svg>
    <input id="search" type="text" placeholder="Buscar película, género, año…"/>
  </div>
</section>

<!-- FILTERS -->
<div class="filters" id="filters"></div>

<!-- SECTION -->
<div class="section-header">
  <h2>Catálogo</h2>
  <span class="count" id="showing-count"></span>
</div>
<div class="grid" id="grid"></div>

<!-- MODAL -->
<div class="modal-bg" id="modal-bg" onclick="closeModal(event)">
  <div class="modal" id="modal">
    <button class="modal-close" onclick="closeModal()">
      <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
    </button>
    <div id="modal-content"></div>
  </div>
</div>

<footer>Mi Cineoteca &mdash; Biblioteca personal de películas</footer>

<script>
// ─────────────────────────────────────────────────────────────────────────────
//  CONFIGURACIÓN DE PELÍCULAS
//  Edita este array para agregar tus películas.
//
//  Campos:
//   title    : Nombre de la película (requerido)
//   year     : Año de estreno
//   genre    : Género principal
//   desc     : Descripción breve
//   poster   : Ruta al poster (ej: "posters/inception.jpg") o URL
//   file     : Ruta al archivo de video (ej: "movies/inception.mp4")
//              Si es una URL de streaming, también funciona.
// ─────────────────────────────────────────────────────────────────────────────
const MOVIES = [
  {
    title:  "Inception",
    year:   2010,
    genre:  "Ciencia Ficción",
    desc:   "Un ladrón que roba secretos corporativos a través de la tecnología del sueño compartido recibe la tarea inversa de plantar una idea en la mente de un CEO.",
    poster: "https://image.tmdb.org/t/p/w500/9gk7adHYeDvHkCSEqAvQNLV5Uge.jpg",
    file:   "movies/inception.mp4"
  },
  {
    title:  "Interstellar",
    year:   2014,
    genre:  "Ciencia Ficción",
    desc:   "Un equipo de exploradores viaja a través de un agujero de gusano en el espacio en un intento de asegurar la supervivencia de la humanidad.",
    poster: "https://image.tmdb.org/t/p/w500/gEU2QniE6E77NI6lCU6MxlNBvIx.jpg",
    file:   "movies/interstellar.mp4"
  },
  {
    title:  "The Dark Knight",
    year:   2008,
    genre:  "Acción",
    desc:   "Batman enfrenta al Joker, un criminal que siembra el caos en Gotham City y lo empuja a sus límites éticos y físicos.",
    poster: "https://image.tmdb.org/t/p/w500/qJ2tW6WMUDux911r6m7haRef0WH.jpg",
    file:   "movies/dark_knight.mp4"
  },
  {
    title:  "Parasite",
    year:   2019,
    genre:  "Thriller",
    desc:   "La familia Kim, que vive en la pobreza, se infiltra astutamente en la vida de la adinerada familia Park.",
    poster: "https://image.tmdb.org/t/p/w500/7IiTTgloJzvGI1TAYymCfbfl3vT.jpg",
    file:   "movies/parasite.mp4"
  },
  {
    title:  "El Señor de los Anillos",
    year:   2001,
    genre:  "Fantasía",
    desc:   "Un joven hobbit debe emprender un peligroso viaje para destruir un anillo maligno que amenaza toda la Tierra Media.",
    poster: "https://image.tmdb.org/t/p/w500/6oom5QYQ2yQTMJIbnvbkBL9cHo6.jpg",
    file:   "movies/lotr.mp4"
  },
  {
    title:  "Pulp Fiction",
    year:   1994,
    genre:  "Crimen",
    desc:   "Las historias entrelazadas de criminales en Los Ángeles se unen a través de la violencia, la redención y el humor negro.",
    poster: "https://image.tmdb.org/t/p/w500/d5iIlFn5s0ImszYzBPb8JPIfbXD.jpg",
    file:   "movies/pulp_fiction.mp4"
  },
];

// ─────────────────────────────────────────────────────────────────────────────

let activeGenre = 'Todos';

function getAllGenres() {
  const genres = ['Todos', ...new Set(MOVIES.map(m => m.genre).filter(Boolean))];
  return genres;
}

function renderFilters() {
  const wrap = document.getElementById('filters');
  getAllGenres().forEach(g => {
    const btn = document.createElement('button');
    btn.className = 'filter-btn' + (g === activeGenre ? ' active' : '');
    btn.textContent = g;
    btn.onclick = () => {
      activeGenre = g;
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      renderGrid();
    };
    wrap.appendChild(btn);
  });
}

function getFiltered() {
  const q = document.getElementById('search').value.toLowerCase().trim();
  return MOVIES.filter(m => {
    const matchGenre = activeGenre === 'Todos' || m.genre === activeGenre;
    const matchQ = !q ||
      m.title.toLowerCase().includes(q) ||
      (m.genre || '').toLowerCase().includes(q) ||
      String(m.year).includes(q) ||
      (m.desc || '').toLowerCase().includes(q);
    return matchGenre && matchQ;
  });
}

function filmIcon() {
  return `<svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="2" width="20" height="20" rx="2.18" ry="2.18"/><line x1="7" y1="2" x2="7" y2="22"/><line x1="17" y1="2" x2="17" y2="22"/><line x1="2" y1="12" x2="22" y2="12"/><line x1="2" y1="7" x2="7" y2="7"/><line x1="2" y1="17" x2="7" y2="17"/><line x1="17" y1="17" x2="22" y2="17"/><line x1="17" y1="7" x2="22" y2="7"/></svg>`;
}

function renderGrid() {
  const movies = getFiltered();
  const grid = document.getElementById('grid');
  const showingCount = document.getElementById('showing-count');
  grid.innerHTML = '';
  showingCount.textContent = movies.length + ' resultado' + (movies.length !== 1 ? 's' : '');

  if (!movies.length) {
    grid.innerHTML = `<div class="empty">${filmIcon()}<p>No se encontraron películas.</p></div>`;
    return;
  }

  movies.forEach((m, i) => {
    const card = document.createElement('div');
    card.className = 'card';
    card.onclick = () => openModal(i);

    const poster = m.poster
      ? `<img class="card-poster" src="${m.poster}" alt="${m.title}" loading="lazy" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">`
        + `<div class="card-poster-placeholder" style="display:none">${filmIcon()}<div class="ph-title">${m.title}</div></div>`
      : `<div class="card-poster-placeholder">${filmIcon()}<div class="ph-title">${m.title}</div></div>`;

    card.innerHTML = `
      ${poster}
      <div class="card-overlay">
        <div class="ov-title">${m.title}</div>
        ${m.desc ? `<div class="ov-desc">${m.desc}</div>` : ''}
        <a class="ov-play" href="${m.file || '#'}" ${m.file ? 'target="_blank"' : ''}>
          <svg xmlns="http://www.w3.org/2000/svg" width="13" height="13" viewBox="0 0 24 24" fill="currentColor"><polygon points="5 3 19 12 5 21 5 3"/></svg>
          Reproducir
        </a>
      </div>
      <div class="card-info">
        <div class="card-title">${m.title}</div>
        <div class="card-meta">
          ${m.year ? `<span class="card-year">${m.year}</span>` : ''}
          ${m.year && m.genre ? '<div class="card-dot"></div>' : ''}
          ${m.genre ? `<span class="card-genre">${m.genre}</span>` : ''}
        </div>
      </div>`;

    grid.appendChild(card);
  });
}

let currentMovies = [];
function openModal(idx) {
  currentMovies = getFiltered();
  const m = currentMovies[idx];
  if (!m) return;

  const posterHTML = m.poster
    ? `<img class="modal-poster" src="${m.poster}" alt="${m.title}" onerror="this.style.display='none'">`
    : `<div class="modal-poster-ph">${filmIcon()}</div>`;

  document.getElementById('modal-content').innerHTML = `
    ${posterHTML}
    <div class="modal-body">
      <div class="modal-title">${m.title}</div>
      <div class="modal-meta">
        ${m.year ? `<span>${m.year}</span>` : ''}
        ${m.genre ? `<span class="tag">${m.genre}</span>` : ''}
      </div>
      ${m.desc ? `<p class="modal-desc">${m.desc}</p>` : ''}
      <div class="modal-actions">
        ${m.file
          ? `<a class="btn-primary" href="${m.file}" target="_blank">
               <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="currentColor"><polygon points="5 3 19 12 5 21 5 3"/></svg>
               Reproducir
             </a>`
          : ''}
      </div>
    </div>`;

  document.getElementById('modal-bg').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeModal(e) {
  if (e && e.target !== document.getElementById('modal-bg') && !e.target.closest('.modal-close')) return;
  document.getElementById('modal-bg').classList.remove('open');
  document.body.style.overflow = '';
}

document.addEventListener('keydown', e => { if (e.key === 'Escape') { document.getElementById('modal-bg').classList.remove('open'); document.body.style.overflow = ''; } });
document.getElementById('search').addEventListener('input', renderGrid);

function init() {
  document.getElementById('nav-count').textContent = MOVIES.length + ' película' + (MOVIES.length !== 1 ? 's' : '');
  renderFilters();
  renderGrid();
}
